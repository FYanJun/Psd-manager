name: Windows Portable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload the portable exe to, for example v0.1.1"
        required: true

permissions:
  contents: write

jobs:
  portable:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build portable executable
        run: npm run tauri -- build --no-bundle

      - name: Resolve release metadata
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.release_tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          $version = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Prepare portable artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist-release"
          Copy-Item "src-tauri/target/release/device-password-manager.exe" "dist-release/Psd-manager_${{ steps.release.outputs.version }}_x64_portable.exe"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Psd-manager_${{ steps.release.outputs.version }}_x64_portable
          path: dist-release/*.exe
          if-no-files-found: error

      - name: Upload portable exe to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: dist-release/*.exe
