name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --bundles dmg
            platformName: macos
            arch: arm64
            packageType: installer
            extension: dmg
          - platform: windows-latest
            args: --bundles nsis
            platformName: windows
            arch: x64
            packageType: installer
            extension: exe

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build package
        run: npm run tauri -- build ${{ matrix.args }}

      - name: Prepare release artifact
        id: artifact
        shell: pwsh
        run: |
          $version = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          $artifactName = "PsdManager-$version-${{ matrix.platformName }}-${{ matrix.arch }}-${{ matrix.packageType }}.${{ matrix.extension }}"
          New-Item -ItemType Directory -Force -Path "dist-release"

          if ("${{ matrix.platformName }}" -eq "macos") {
            $source = Get-ChildItem "src-tauri/target/release/bundle/dmg" -Filter "*.dmg" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          } else {
            $source = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          }

          if (-not $source) {
            throw "Release artifact was not found."
          }

          Copy-Item $source.FullName "dist-release/$artifactName"
          "name=$artifactName" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: dist-release/*
          if-no-files-found: error

      - name: Upload package to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Psd Manager ${{ github.ref_name }}
          body: |
            设备密码管理工具发布包。

            - macOS: `PsdManager-${{ steps.artifact.outputs.version }}-macos-arm64-installer.dmg`
            - Windows 安装版: `PsdManager-${{ steps.artifact.outputs.version }}-windows-x64-installer.exe`
            - Windows 免安装版: `PsdManager-${{ steps.artifact.outputs.version }}-windows-x64-portable.exe`

            macOS 如果提示“已损坏，无法打开”，通常是当前包未做 Apple Developer ID 签名和公证，被 Gatekeeper 拦截。把应用拖到“应用程序”后执行：

            ```bash
            xattr -dr com.apple.quarantine "/Applications/设备密码管理工具.app"
            ```

            然后重新打开应用。
          files: dist-release/*
