name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --bundles dmg
          - platform: windows-latest
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: Psd-manager ${{ github.ref_name }}
          releaseBody: |
            设备密码管理工具发布包。

            - macOS: DMG 安装包
            - Windows: EXE 安装包

            macOS 如果提示“已损坏，无法打开”，通常是当前包未做 Apple Developer ID 签名和公证，被 Gatekeeper 拦截。把应用拖到“应用程序”后执行：

            ```bash
            xattr -dr com.apple.quarantine "/Applications/设备密码管理工具.app"
            ```

            然后重新打开应用。
          releaseDraft: false
          prerelease: false
